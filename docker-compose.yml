services:
  db:
    image: postgres:16
    platform: linux/amd64
    container_name: proyecto_tesis_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-proyecto_tesis}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proyecto_tesis"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./Backend
    container_name: proyecto_tesis_backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-proyecto_tesis}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./Frontend
    container_name: proyecto_tesis_frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
      VITE_VISION_URL: ${VITE_VISION_URL:-http://localhost:5001}
    depends_on:
      - backend

  vision:
    build: ./Vision
    container_name: proyecto_tesis_vision
    ports:
      - "${VISION_PORT:-5001}:5001"
    environment:
      CAMERA_RTSP_URL: ${CAMERA_RTSP_URL:-}
      CAMERA_ID: ${CAMERA_ID:-main_camera}
      BACKEND_URL: ${BACKEND_URL:-http://backend:3001}
      VISION_PORT: 5001
      VISION_CONFIDENCE: ${VISION_CONFIDENCE:-0.45}
      VISION_LINE_POSITION: ${VISION_LINE_POSITION:-0.55}
      VISION_DETECTION_INTERVAL: ${VISION_DETECTION_INTERVAL:-5}
      VISION_RTSP_TRANSPORT: ${VISION_RTSP_TRANSPORT:-udp}
      VISION_STREAM_WIDTH: ${VISION_STREAM_WIDTH:-640}
      VISION_STREAM_HEIGHT: ${VISION_STREAM_HEIGHT:-360}
      VISION_DEMO_MIN_BOXES: ${VISION_DEMO_MIN_BOXES:-0}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

